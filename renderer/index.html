<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hadi Agent — طباعة POS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0 fw-bold">Hadi Agent</h5>
      <div class="d-flex gap-2">
        <button id="btn-settings" class="btn btn-outline-secondary btn-sm" title="الإعدادات">⚙</button>
        <button id="btn-diagnose" class="btn btn-outline-warning btn-sm">🔍 تشخيص</button>
        <button id="btn-refresh" class="btn btn-outline-secondary btn-sm">تحديث</button>
      </div>
    </div>

    <div id="settings-panel" class="card mb-3" style="display:none">
      <div class="card-body py-2">
        <label class="form-label small mb-1">رابط Massar</label>
        <div class="input-group input-group-sm mb-2">
          <input id="input-server-url" type="text" class="form-control" placeholder="http://127.0.0.1:8080">
          <button id="btn-save-config" class="btn btn-success">حفظ</button>
        </div>
        <label class="form-label small mb-1">Token (نفس HADI_AGENT_TOKEN في .env)</label>
        <input id="input-agent-token" type="password" class="form-control form-control-sm mb-2" placeholder="الصق التوكن هنا" autocomplete="off">
        <p class="text-muted small mt-2 mb-0">
          Agent يختار منفذاً تلقائياً (5000–5010) — يُحفظ في الإعدادات ويُكتشَف من المتصفح.
        </p>
      </div>
    </div>

    <div id="status-msg" class="small mb-2"></div>

    <div class="card mb-3 border-0 shadow-sm">
      <div class="card-body py-2 px-3">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <span class="fw-semibold small">طباعة من POSDB</span>
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="hw-enable-toggle" role="switch" checked>
            <label class="form-check-label small" for="hw-enable-toggle">مفعّل</label>
          </div>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-3 mb-2">
          <span class="small">الحالة: <strong id="hw-polling-status">—</strong></span>
          <span class="small">مطبوع: <strong id="hw-printed-count">0</strong></span>
          <button id="hw-btn-toggle" class="btn btn-outline-secondary btn-sm">إيقاف/تشغيل</button>
        </div>
        <div id="hw-errors-card" style="display:none">
          <ul class="list-group list-group-flush" id="hw-errors-ul"></ul>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header py-2 fw-bold small">بيانات POSDB (للمراجعة فقط)</div>
      <div class="card-body py-2 small" id="posdb-summary">
        <div class="text-muted">اضغط تحديث…</div>
      </div>
    </div>

  </div>

  <div id="diagnose-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:10px; width:480px; max-height:80vh; overflow-y:auto; padding:20px; direction:rtl;">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold mb-0">🔍 تشخيص</h6>
        <button id="btn-close-diagnose" class="btn btn-sm btn-outline-secondary">✕</button>
      </div>
      <div id="diagnose-results"></div>
      <div class="mt-3 d-flex gap-2">
        <button id="btn-run-diagnose" class="btn btn-warning btn-sm">▶ تشغيل</button>
        <button id="btn-open-settings-from-diagnose" class="btn btn-outline-secondary btn-sm">⚙ إعدادات</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
